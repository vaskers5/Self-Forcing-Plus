# I2V 14B Self-Forcing (Distribution Matching Distillation)
# Configuration optimized for 2x A100 GPUs

generator_ckpt: checkpoints/ode_init.pt

i2v: true
generator_fsdp_wrap_strategy: size
real_score_fsdp_wrap_strategy: size
fake_score_fsdp_wrap_strategy: size

real_name: Wan2.1-I2V-14B-480P
fake_name: Wan2.1-I2V-14B-480P
generator_type: causal  # как в оригинальном Self‑Forcing
generator_name: Wan2.1-I2V-14B-480P

text_encoder_fsdp_wrap_strategy: size
image_encoder_fsdp_wrap_strategy: size
text_encoder_cpu_offload: true
image_encoder_cpu_offload: true

denoising_step_list:
  - 1000
  - 750
  - 500
  - 250
warp_denoising_step: true        # уберите 0 из списка, если он там был
ts_schedule: false
num_train_timestep: 1000
timestep_shift: 5.0
guidance_scale: 3.0
denoising_loss_type: flow
mixed_precision: true
seed: 0

wandb_host: https://api.wandb.ai
wandb_key: dc043a7ece6465ed2d1dd720bfce881838696237
wandb_entity: danil-krokodil-itmo-university
wandb_project: SelfForcing

sharding_strategy: hybrid_full
lr: 2.0e-06
lr_critic: 4.0e-07
beta1: 0.0
beta2: 0.999
beta1_critic: 0.0
beta2_critic: 0.999

data_type: text_folder
data_path: /slow_data_new/datasets/wan_14b_i2v_selforcing/lmdb/
batch_size: 1

ema_weight: 0.99
ema_start_step: 200
total_batch_size: 1
log_iters: 50

negative_prompt: |
  色调艳丽，过曝, 静态, 细节模糊不清, 字幕, 风格, 作品, 画作, 画面,
  静止, 整体发灰, 最差质量, 低质量, JPEG压缩残留, 丑陋的, 残缺的,
  多余的手指, 画得不好的手部, 画得不好的脸部, 畸形的, 毁容的,
  形态畸形的肢体, 手指融合, 静止不动的画面, 杂乱的背景, 三条腿,
  背景人很多, 倒着走

dfake_gen_update_ratio: 5
image_or_video_shape:
  - 1      # заменяется на размер batch
  - 21
  - 16
  - 60
  - 104

distribution_loss: dmd
trainer: score_distillation
gradient_checkpointing: true
num_frame_per_block: 3
load_raw_video: false

model_kwargs:
  timestep_shift: 5.0
